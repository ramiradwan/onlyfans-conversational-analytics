name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            extension/package-lock.json

      - name: Cache build caches
        uses: actions/cache@v4
        with:
          path: |
            frontend/.vite
            frontend/.swc
            frontend/.eslintcache
            frontend/tsconfig.tsbuildinfo
          key: build-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install extension dependencies
        run: npm ci --prefix extension

      - name: Test backend
        run: python -m pytest

      - name: Test frontend
        run: npm test --prefix frontend

      - name: Test extension
        run: npm test --prefix extension

      - name: Build and audit deterministic extension artifact
        run: |
          npm run build --prefix extension
          npm run audit --prefix extension

      - name: Qualify bounded 10k-message snapshot repair
        run: npm run qualify:snapshot:ci --prefix extension

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/static/dist/

      - name: Upload audited extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/

  capture-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            extension/package-lock.json
            tools/e2e-capture/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install extension dependencies
        run: npm ci --prefix extension

      - name: Build and audit deterministic extension artifact
        run: |
          npm run build --prefix extension
          npm run audit --prefix extension

      - name: Build production Bridge
        run: npm run build --prefix frontend

      - name: Install pinned E2E dependencies
        run: npm ci --prefix tools/e2e-capture

      - name: Install Playwright Chromium and system dependencies
        working-directory: tools/e2e-capture
        run: npx playwright install --with-deps chromium

      - name: Run capture E2E beneath Xvfb
        working-directory: tools/e2e-capture
        run: xvfb-run --auto-servernum npm test
